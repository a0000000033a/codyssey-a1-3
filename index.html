<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>밥밥 | AI 메뉴 추천</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="./index.html" aria-label="밥밥 홈">
        <span class="brand-mark">밥</span>
        <span>밥밥</span>
      </a>
      <nav class="nav" aria-label="주요 메뉴">
        <a class="nav-link active" href="./index.html">메뉴 입력</a>
        <a class="nav-link" href="./answer.html">AI 답변</a>
        <a class="nav-link" href="./restaurants.html">맛집 추천</a>
      </nav>
    </header>

    <main class="page-shell">
      <section class="hero-panel input-layout">
        <div class="intro-copy">
          <p class="eyebrow">AI 메뉴 큐레이터</p>
          <h1>오늘의 한 끼, 밥밥이 골라줄게요.</h1>
          <p>
            기분, 날씨, 예산, 같이 먹는 사람처럼 지금 상황을 자유롭게 적으면
            어울리는 메뉴와 이유를 정리해 드립니다.
          </p>
        </div>

        <form class="prompt-form" id="recommendForm">
          <label for="promptInput">지금 먹고 싶은 분위기</label>
          <textarea
            id="promptInput"
            name="prompt"
            maxlength="300"
            rows="8"
            placeholder="예: 비도 오고 몸이 으슬으슬해서 따뜻하고 든든한 점심을 먹고 싶어. 너무 비싸지 않았으면 좋겠어."
            required
          ></textarea>
          <div class="form-row">
            <span id="charCount">0 / 300</span>
            <button class="primary-button" type="submit">메뉴 추천받기</button>
          </div>
          <p class="status-message" id="formStatus" role="status" aria-live="polite"></p>
        </form>
      </section>

      <section class="info-grid" aria-label="서비스 특징">
        <article>
          <h2>자유 입력</h2>
          <p>정해진 버튼 대신 문장으로 상황을 설명할 수 있습니다.</p>
        </article>
        <article>
          <h2>JSON 기반 응답</h2>
          <p>AI 답변을 구조화해 메뉴, 이유, 검색어를 안정적으로 사용합니다.</p>
        </article>
        <article>
          <h2>근처 음식점</h2>
          <p>현재 위치 또는 개포동역 기준으로 가까운 음식점을 찾습니다.</p>
        </article>
      </section>
    </main>

    <script src="./js/app.js"></script>
  </body>
</html>
